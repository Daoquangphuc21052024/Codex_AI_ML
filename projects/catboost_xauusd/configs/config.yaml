mt5:
  source: "mt5"
  symbol: "XAUUSD"
  timeframe: "H1"
  timezone: "UTC"
  start_utc: "2021-01-01T00:00:00Z"
  end_utc: null
  login: null
  password: null
  server: null
  csv_path: null

labeling:
  horizon_bars: 12
  tp_points: [2.0, 3.0, 5.0]
  sl_points: [2.0, 3.0, 5.0]
  tie_breaker: "sl_priority"

features:
  max_features: 15
  windows: [6, 12, 24]
